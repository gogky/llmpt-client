# Docker Compose for WebSeed + P2P hybrid E2E test.
#
# This file tests the hybrid scenario: a P2P seeder IS present AND
# WebSeed is enabled. libtorrent should intelligently schedule pieces
# from both the P2P peer and the WebSeed HTTP source.
#
# Usage:
#   docker compose -f docker-compose.test-hybrid.yml up --build
#
version: '3.8'

networks:
  llmpt_test:
    driver: bridge

services:
  # ── Seeder: seeds via P2P as usual ───────────────────────────────────
  seeder:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.test
    container_name: llmpt-hybrid-seeder
    volumes:
      - .:/app
    environment:
      - HF_HOME=/tmp/hf_cache_seeder
      - ROLE=seeder
      - TRACKER_URL=http://118.195.159.242
      - HF_P2P_PORT=6881
    networks:
      - llmpt_test
    command: ["python", "-m", "pytest", "tests/e2e/run_seeder.py", "--run-integration", "-s", "--log-cli-level=INFO"]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://118.195.159.242/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Hybrid Downloader: P2P peer + WebSeed ────────────────────────────
  downloader-hybrid:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.test
    container_name: llmpt-downloader-hybrid
    depends_on:
      seeder:
        condition: service_started
    volumes:
      - .:/app
    environment:
      - HF_HOME=/tmp/hf_cache_hybrid
      - ROLE=downloader
      - TRACKER_URL=http://118.195.159.242
      - TEST_SEEDER_PEER=llmpt-hybrid-seeder:6881
      # HF_P2P_WEBSEED defaults to '1' (enabled) — both P2P and WebSeed active
    networks:
      - llmpt_test
    command: >
      python -m pytest
      tests/e2e/test_docker_p2p.py::test_webseed_with_p2p_download
      --run-integration -v -s --log-cli-level=INFO
